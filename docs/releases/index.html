    <h3>No packaged releases yet</h3>
    <p>Prism is early. Until the first tagged release, it runs from source:</p>
    <pre class="mono"><code>git clone https://github.com/Olaiwonismail/prism
cd prism
python -m venv venv
./venv/Scripts/pip install -r requirements.txt
./venv/Scripts/python app.py</code></pre>
    <p class="muted small">One-time setup: install
    <a href="https://vb-audio.com/Cable/" target="_blank" rel="noopener">VB-Audio Virtual Cable</a>

    <code>scripts/fetch_deepfilternet.py</code>.</p>
